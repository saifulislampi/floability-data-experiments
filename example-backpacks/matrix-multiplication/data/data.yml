schema_version: 1.0
default_profile: matrix_s3

profiles:
  matrix_s3:
    data:
      - name: matrix_200
        source_type: s3
        source: s3://floability/matrix_200_200
        target_path: data/matrices

  matrix_data:
    policy:
      retry_attempts: 3
      timeout: 60
      size_tolerance_bytes: 1024
    
    data:
