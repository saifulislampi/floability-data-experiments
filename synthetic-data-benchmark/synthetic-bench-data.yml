    data:
      - name: dir_1000_mixed
        source_type: s3
        source: s3://floability/floability-cache-bench/dirs/dir_1000_mixed/
        target_path: data/dirs/dir_1000_mixed

  dir_5000_mixed:
    policy:
      retry_attempts: 0
      timeout: 600
    data:
      - name: dir_5000_mixed
        source_type: s3
        source: s3://floability/floability-cache-bench/dirs/dir_5000_mixed/
        target_path: data/dirs/dir_5000_mixed

  dir_10000_mixed:
    policy:
      retry_attempts: 0
      timeout: 900
    data:
      - name: dir_10000_mixed
        source_type: s3
